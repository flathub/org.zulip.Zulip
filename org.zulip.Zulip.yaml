app-id: org.zulip.Zulip
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: run.sh
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
modules:
  - name: zulip
    buildsystem: simple
    build-options:
      append-path: /run/build/zulip/bin:/usr/lib/sdk/node24/bin
    subdir: main
    build-commands:
      - mkdir ../bin
      - ln -s ../pnpm/bin/pnpm.mjs ../bin/pnpm
      - cat ../pnpm-workspace.yaml >> pnpm-workspace.yaml
      - "echo 'trustLockfile: true' >> pnpm-workspace.yaml"
      - pnpm install --frozen-lockfile --ignore-scripts --offline
      - npm_package_config_node_gyp_nodedir="$FLATPAK_BUILDER_BUILDDIR/flatpak-node/cache/node-gyp/42.5.0" node --run postinstall
      - |
        set -eux
        . ../flatpak-node/electron-builder-arch-args.sh
        export XDG_CACHE_HOME="$FLATPAK_BUILDER_BUILDDIR/flatpak-node/cache"
        node --run pack -- $ELECTRON_BUILDER_ARCH_ARGS --linux --config.electronDownload.unsafelyDisableChecksums=true
      - mv dist/linux*-unpacked $FLATPAK_DEST/main
      - install -D -m 644 build/zulip.png $FLATPAK_DEST/share/icons/hicolor/512x512/apps/$FLATPAK_ID.png
      - install -D -m 755 -t $FLATPAK_DEST/bin ../run.sh
      - install -D -m 644 -t $FLATPAK_DEST/share/applications ../$FLATPAK_ID.desktop
      - install -D -m 644 -t $FLATPAK_DEST/share/metainfo ../$FLATPAK_ID.metainfo.xml
    sources:
      - type: git
        dest: main
        url: https://github.com/zulip/zulip-desktop.git
        tag: v5.12.4
        commit: 9d9e25bd781f681eac952768367432514c15858d
        x-checker-data:
          type: json
          url: https://api.github.com/repos/zulip/zulip-desktop/releases/latest
          tag-query: .tag_name
          version-query: .tag_name | sub("^v"; "")
          timestamp-query: .published_at
      - type: archive
        dest: pnpm
        url: https://registry.npmjs.org/pnpm/-/pnpm-11.9.0.tgz
        sha512: bd682d5d03fe525ef7c9fd6780c6884d1e756ac4c9c9fe00c538782824310dcf90e3ddc4f53835f06dfaebd5085e41855e0bcbb3b60de2ac5bbab89e5036f03b
      - generated-sources.json
      - type: script
        dest-filename: run.sh
        commands:
          - set -eu
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - exec zypak-wrapper.sh /app/main/zulip "$@"
      - type: file
        path: org.zulip.Zulip.desktop
      - type: file
        path: org.zulip.Zulip.metainfo.xml
